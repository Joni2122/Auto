<!DOCTYPE html><html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Auto Spiel</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }.ui {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.btn {
  position: absolute;
  padding: 15px 20px;
  border-radius: 15px;
  border: none;
  color: white;
  font-size: 16px;
  pointer-events: all;
  user-select: none;
}

#left { bottom: 20px; left: 20px; background: #444; }
#right { bottom: 20px; left: 110px; background: #444; }
#gas { bottom: 20px; right: 20px; background: green; }
#brake { bottom: 20px; right: 120px; background: red; }

  </style>
</head>
<body><div class="ui">
  <button id="left" class="btn">⬅️ Links</button>
  <button id="right" class="btn">➡️ Rechts</button>
  <button id="gas" class="btn">Gas</button>
  <button id="brake" class="btn">Bremse</button>
</div><script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script><script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);

let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Boden
let groundGeo = new THREE.PlaneGeometry(200, 200);
let groundMat = new THREE.MeshStandardMaterial({ color: 0x2ecc71 });
let ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Licht
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

// Auto (einfacher Würfel)
let carGeo = new THREE.BoxGeometry(1, 0.5, 2);
let carMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
let car = new THREE.Mesh(carGeo, carMat);
car.position.y = 0.5;
scene.add(car);

// Controls
let controls = { left:false, right:false, gas:false, brake:false };

document.getElementById("left").onpointerdown = () => controls.left = true;
document.getElementById("left").onpointerup = () => controls.left = false;

document.getElementById("right").onpointerdown = () => controls.right = true;
document.getElementById("right").onpointerup = () => controls.right = false;

document.getElementById("gas").onpointerdown = () => controls.gas = true;
document.getElementById("gas").onpointerup = () => controls.gas = false;

document.getElementById("brake").onpointerdown = () => controls.brake = true;
document.getElementById("brake").onpointerup = () => controls.brake = false;

let speed = 0;
let rotation = 0;

function animate() {
  requestAnimationFrame(animate);

  if (controls.gas) speed += 0.002;
  else speed *= 0.98;

  if (controls.brake) speed *= 0.9;

  if (controls.left) rotation += 0.03;
  if (controls.right) rotation -= 0.03;

  car.rotation.y = rotation;

  car.position.x -= Math.sin(rotation) * speed;
  car.position.z -= Math.cos(rotation) * speed;

  camera.position.x = car.position.x + Math.sin(rotation) * 5;
  camera.position.z = car.position.z + Math.cos(rotation) * 5;
  camera.lookAt(car.position);

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script></body>
</html>
