<!DOCTYPE html><html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Auto Stadt Spiel</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }.ui { position: absolute; width: 100%; height: 100%; pointer-events: none; }

.btn {
  position: absolute;
  padding: 14px 18px;
  border-radius: 14px;
  border: none;
  color: white;
  font-size: 16px;
  pointer-events: all;
  user-select: none;
}

#left { bottom: 20px; left: 20px; background: #444; }
#right { bottom: 20px; left: 110px; background: #444; }
#gas { bottom: 20px; right: 20px; background: #1db954; }
#brake { bottom: 20px; right: 120px; background: #e74c3c; }

  </style>
</head>
<body><div class="ui">
  <button id="left" class="btn">⬅️</button>
  <button id="right" class="btn">➡️</button>
  <button id="gas" class="btn">Gas</button>
  <button id="brake" class="btn">Bremse</button>
</div><script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script><script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 6, 10);

let renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Licht
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// =====================
// 🌍 STADT / WELT
// =====================

// Boden
let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500, 500),
  new THREE.MeshStandardMaterial({ color: 0x3cb371 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Straßen (Grid)
let roadMat = new THREE.MeshStandardMaterial({ color: 0x222222 });

for (let i = -5; i <= 5; i++) {
  let road1 = new THREE.Mesh(new THREE.PlaneGeometry(500, 8), roadMat);
  road1.rotation.x = -Math.PI / 2;
  road1.position.z = i * 40;
  road1.position.y = 0.01;
  scene.add(road1);

  let road2 = new THREE.Mesh(new THREE.PlaneGeometry(8, 500), roadMat);
  road2.rotation.x = -Math.PI / 2;
  road2.position.x = i * 40;
  road2.position.y = 0.01;
  scene.add(road2);
}

// Gebäude
let buildings = [];
for (let i = 0; i < 120; i++) {
  let h = Math.random() * 8 + 2;
  let b = new THREE.Mesh(
    new THREE.BoxGeometry(6, h, 6),
    new THREE.MeshStandardMaterial({ color: 0x888888 })
  );

  let x = (Math.floor(Math.random() * 10) - 5) * 40 + (Math.random() * 10);
  let z = (Math.floor(Math.random() * 10) - 5) * 40 + (Math.random() * 10);

  b.position.set(x, h / 2, z);
  scene.add(b);
  buildings.push(b);
}

// =====================
// 🚗 AUTO (besseres Design)
// =====================
let car = new THREE.Group();

let base = new THREE.Mesh(
  new THREE.BoxGeometry(1.5, 0.5, 3),
  new THREE.MeshStandardMaterial({ color: 0xff0000 })
);
base.position.y = 0.5;
car.add(base);

let cabin = new THREE.Mesh(
  new THREE.BoxGeometry(1, 0.5, 1.2),
  new THREE.MeshStandardMaterial({ color: 0xaa0000 })
);
cabin.position.set(0, 0.9, -0.2);
car.add(cabin);

car.position.y = 0;
scene.add(car);

// =====================
// CONTROLS
// =====================
let controls = { left:false, right:false, gas:false, brake:false };

document.getElementById("left").onpointerdown = () => controls.left = true;
document.getElementById("left").onpointerup = () => controls.left = false;

document.getElementById("right").onpointerdown = () => controls.right = true;
document.getElementById("right").onpointerup = () => controls.right = false;

document.getElementById("gas").onpointerdown = () => controls.gas = true;
document.getElementById("gas").onpointerup = () => controls.gas = false;

document.getElementById("brake").onpointerdown = () => controls.brake = true;
document.getElementById("brake").onpointerup = () => controls.brake = false;

// =====================
// PHYSIK
// =====================
let speed = 0;
let rot = 0;

function animate() {
  requestAnimationFrame(animate);

  if (controls.gas) speed += 0.003;
  else speed *= 0.98;

  if (controls.brake) speed *= 0.9;

  if (controls.left) rot += 0.04;
  if (controls.right) rot -= 0.04;

  car.rotation.y = rot;

  car.position.x -= Math.sin(rot) * speed;
  car.position.z -= Math.cos(rot) * speed;

  // Kamera folgt Auto
  camera.position.x = car.position.x + Math.sin(rot) * 8;
  camera.position.z = car.position.z + Math.cos(rot) * 8;
  camera.position.y = 5;
  camera.lookAt(car.position);

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script></body>
</html>
