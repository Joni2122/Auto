<!DOCTYPE html><html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Auto Stadt Pro</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }.ui { position: absolute; width: 100%; height: 100%; pointer-events: none; }

/* Lenkrad */
#wheel {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 6px solid #444;
  pointer-events: all;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  user-select: none;
  transform: rotate(0deg);
  background: rgba(0,0,0,0.3);
}

/* Pedale */
.pedal {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 20px;
  color: white;
  pointer-events: all;
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

#gas { bottom: 20px; right: 20px; background: #1db954; }
#brake { bottom: 20px; right: 120px; background: #e74c3c; }

  </style>
</head>
<body><div class="ui">
  <div id="wheel">⟲</div>
  <div id="gas" class="pedal">Gas</div>
  <div id="brake" class="pedal">Bremse</div>
</div><script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script><script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0,6,10);

let renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.6));
let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,20,10);
scene.add(light);

// WORLD BORDER
let world=300;
function clamp(o){
  o.position.x=Math.max(-world,Math.min(world,o.position.x));
  o.position.z=Math.max(-world,Math.min(world,o.position.z));
}

// GROUND
let ground=new THREE.Mesh(
  new THREE.PlaneGeometry(1000,1000),
  new THREE.MeshStandardMaterial({color:0x2e8b57})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ROADS
let roadMat=new THREE.MeshStandardMaterial({color:0x222222});
for(let i=-6;i<=6;i++){
  let r1=new THREE.Mesh(new THREE.PlaneGeometry(1000,12),roadMat);
  r1.rotation.x=-Math.PI/2;
  r1.position.z=i*70;
  r1.position.y=0.01;
  scene.add(r1);

  let r2=new THREE.Mesh(new THREE.PlaneGeometry(12,1000),roadMat);
  r2.rotation.x=-Math.PI/2;
  r2.position.x=i*70;
  r2.position.y=0.01;
  scene.add(r2);
}

// TRAFFIC LIGHTS
let lights=[];
function makeLight(x,z){
  let pole=new THREE.Mesh(
    new THREE.CylinderGeometry(0.2,0.2,5),
    new THREE.MeshStandardMaterial({color:0x555555})
  );

  let head=new THREE.Mesh(
    new THREE.BoxGeometry(0.8,2,0.8),
    new THREE.MeshStandardMaterial({color:0x111111})
  );

  pole.position.set(x,2.5,z);
  head.position.set(x,5,z);

  scene.add(pole);
  scene.add(head);

  lights.push(head);
}

for(let i=0;i<10;i++)makeLight((i-5)*70,0);

setInterval(()=>{
  lights.forEach(l=>{
    let c=Math.random();
    l.material.color.set(c>0.5?"red":"green");
  });
},2000);

// BUILDINGS (structured windows)
let buildings=[];
function building(x,z){
  let h=10+Math.random()*20;

  let geo=new THREE.BoxGeometry(10,h,10);
  let mat=new THREE.MeshStandardMaterial({color:0x888888});
  let b=new THREE.Mesh(geo,mat);
  b.position.set(x,h/2,z);
  scene.add(b);

  // WINDOWS GRID
  for(let i=0;i<4;i++){
    for(let j=0;j<Math.floor(h/3);j++){
      let w=new THREE.Mesh(
        new THREE.PlaneGeometry(1,1.2),
        new THREE.MeshStandardMaterial({color:0xffffaa, emissive:0xffffaa, emissiveIntensity:0.2})
      );
      w.position.set(x+5.01,z-4+(i*2),1+j*2);
      w.position.y=1+j*3;
      scene.add(w);
    }
  }

  buildings.push(b);
}

for(let i=0;i<60;i++)building((Math.random()-0.5)*600,(Math.random()-0.5)*600);

// OBJECTS
let objects=[];
function tree(x,z){
  let t=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,3),new THREE.MeshStandardMaterial({color:0x8b5a2b}));
  let l=new THREE.Mesh(new THREE.SphereGeometry(2),new THREE.MeshStandardMaterial({color:0x228b22}));
  t.position.set(x,1.5,z);
  l.position.set(x,4,z);
  scene.add(t);scene.add(l);
  objects.push(t,l);
}

for(let i=0;i<40;i++)tree((Math.random()-0.5)*600,(Math.random()-0.5)*600);

// CAR (with wheels + raised)
let car=new THREE.Group();

let body=new THREE.Mesh(new THREE.BoxGeometry(2,0.8,4),new THREE.MeshStandardMaterial({color:0xff0000}));
body.position.y=1;
car.add(body);

function wheel(x,z){
  let w=new THREE.Mesh(
    new THREE.CylinderGeometry(0.4,0.4,0.5),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  w.rotation.z=Math.PI/2;
  w.position.set(x,0.4,z);
  car.add(w);
}

wheel(1,1.5);
wheel(-1,1.5);
wheel(1,-1.5);
wheel(-1,-1.5);

car.position.y=0;
scene.add(car);

// CONTROLS
let gas=false,brake=false,wheelRot=0;

wheel.onpointerdown=e=>{wheel.drag=true;};
window.onpointermove=e=>{
  if(wheel.drag){
    wheelRot+=(e.movementX||0)*0.01;
    wheel.style.transform=`rotate(${wheelRot*50}deg)`;
  }
};
window.onpointerup=()=>wheel.drag=false;

gas.onpointerdown=()=>gas=true;
gas.onpointerup=()=>gas=false;
brake.onpointerdown=()=>brake=true;
brake.onpointerup=()=>brake=false;

// PHYSICS
let speed=0,rot=0;

function collide(list){
  for(let o of list){
    let dx=car.position.x-o.position.x;
    let dz=car.position.z-o.position.z;
    if(Math.sqrt(dx*dx+dz*dz)<2){
      speed*=-0.3;
      car.position.x+=dx*0.2;
      car.position.z+=dz*0.2;
    }
  }
}

function animate(){
  requestAnimationFrame(animate);

  if(gas)speed+=0.004;
  else speed*=0.98;
  if(brake)speed*=0.9;

  rot-=wheelRot*0.05;

  car.rotation.y=rot;

  car.position.x-=Math.sin(rot)*speed;
  car.position.z-=Math.cos(rot)*speed;

  collide(objects);
  collide(buildings);

  clamp(car);

  camera.position.x=car.position.x+Math.sin(rot)*8;
  camera.position.z=car.position.z+Math.cos(rot)*8;
  camera.position.y=6;
  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script></body>
</html>
