<!DOCTYPE html><html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Auto Stadt</title>
<style>
  body{margin:0;overflow:hidden;background:#000;font-family:sans-serif}
  canvas{display:block}/* UI */ .ui{position:absolute;inset:0;pointer-events:none}

/* Lenkrad modern */ #wheel{ position:absolute; bottom:20px; left:20px; width:110px; height:110px; border-radius:50%; border:8px solid #333; background:rgba(255,255,255,0.05); pointer-events:auto; display:flex; align-items:center; justify-content:center; color:#fff; font-size:28px; user-select:none; }

/* Pedale modern */ .pedal{ position:absolute; width:90px; height:90px; border-radius:18px; pointer-events:auto; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; user-select:none; }

#gas{right:20px;bottom:20px;background:#1db954} #brake{right:120px;bottom:20px;background:#e74c3c} </style>

</head>
<body><div class="ui">
  <div id="wheel">◯</div>
  <div id="gas" class="pedal">Gas</div>
  <div id="brake" class="pedal">Bremse</div>
</div><script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script><script>
// ===== Scene =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// Licht
scene.add(new THREE.AmbientLight(0xffffff,0.6));
const sun=new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
scene.add(sun);

// ===== WORLD =====
const worldSize=400;

// Boden
const ground=new THREE.Mesh(
  new THREE.PlaneGeometry(2000,2000),
  new THREE.MeshStandardMaterial({color:0x2e8b57})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// Straße + Mittelstreifen
const roadMat=new THREE.MeshStandardMaterial({color:0x222});
const lineMat=new THREE.MeshStandardMaterial({color:0xffffff});

for(let i=-5;i<=5;i++){
  const road=new THREE.Mesh(new THREE.PlaneGeometry(2000,14),roadMat);
  road.rotation.x=-Math.PI/2;
  road.position.z=i*80;
  road.position.y=0.02;
  scene.add(road);

  const line=new THREE.Mesh(new THREE.PlaneGeometry(2000,0.5),lineMat);
  line.rotation.x=-Math.PI/2;
  line.position.z=i*80;
  line.position.y=0.03;
  scene.add(line);
}

// ===== Gebäude (sauber + feste Kollisionsbox) =====
const colliders=[];

function building(x,z){
  const h=10+Math.random()*25;

  const mesh=new THREE.Mesh(
    new THREE.BoxGeometry(12,h,12),
    new THREE.MeshStandardMaterial({color:0x888888})
  );

  mesh.position.set(x,h/2,z);
  scene.add(mesh);

  colliders.push({x,z,r:8});
}

// Stadt grid
for(let x=-300;x<=300;x+=40){
  for(let z=-300;z<=300;z+=40){
    if(Math.random()>0.7) building(x+(Math.random()*10),z+(Math.random()*10));
  }
}

// ===== Ampeln (funktionierend) =====
const lights=[];
function traffic(x,z){
  const pole=new THREE.Mesh(
    new THREE.CylinderGeometry(0.3,0.3,6),
    new THREE.MeshStandardMaterial({color:0x444})
  );

  const lamp=new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:"green"})
  );

  pole.position.set(x,3,z);
  lamp.position.set(x,6,z);

  scene.add(pole);
  scene.add(lamp);

  lights.push(lamp);
}

for(let i=0;i<8;i++) traffic(i*80-300,0);

setInterval(()=>{
  lights.forEach(l=>{
    l.material.color.set(Math.random()>0.5?"green":"red");
  });
},2000);

// ===== Auto =====
const car=new THREE.Group();

const body=new THREE.Mesh(
  new THREE.BoxGeometry(2,0.8,4),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
body.position.y=1;
car.add(body);

car.position.set(0,0,0); // SPAWN MITTE STRAßE
scene.add(car);

// ===== Controls =====
let gas=false,brake=false,wheelAngle=0;

const wheel=document.getElementById("wheel");

wheel.onpointerdown=()=>wheel.drag=true;
window.onpointerup=()=>wheel.drag=false;

window.onpointermove=(e)=>{
  if(wheel.drag){
    wheelAngle+=e.movementX*0.005;
    wheel.style.transform=`rotate(${wheelAngle*120}deg)`;
  }
};

gas.onpointerdown=()=>gas=true;
gas.onpointerup=()=>gas=false;
brake.onpointerdown=()=>brake=true;
brake.onpointerup=()=>brake=false;

// ===== Physics =====
let speed=0;
let rot=0;

function collide(){
  for(let c of colliders){
    const dx=car.position.x-c.x;
    const dz=car.position.z-c.z;
    const d=Math.sqrt(dx*dx+dz*dz);

    if(d<c.r){
      speed*=-0.4;
      car.position.x+=dx*0.2;
      car.position.z+=dz*0.2;
    }
  }
}

// ===== Loop =====
function animate(){
  requestAnimationFrame(animate);

  // steering smooth
  rot-=wheelAngle*0.08;

  if(gas)speed+=0.004;
  else speed*=0.98;

  if(brake)speed*=0.85;

  car.rotation.y=rot;

  car.position.x-=Math.sin(rot)*speed;
  car.position.z-=Math.cos(rot)*speed;

  collide();

  // camera smooth follow
  camera.position.x=car.position.x+Math.sin(rot)*10;
  camera.position.z=car.position.z+Math.cos(rot)*10;
  camera.position.y=6;
  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script></body>
</html>
